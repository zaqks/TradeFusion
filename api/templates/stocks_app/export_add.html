{% extends 'widgets/app_base/app_base_client.html' %}

{% block page_title %}
{% endblock %}


{% block page_body %}

{% load static %}
<link rel="stylesheet" href="{% static 'widgets/section/section.css' %}">
<link rel="stylesheet" href="{% static 'widgets/form/form.css' %}">


<div class="section">
    <div class="section_title">
        <h1>Export A Stock</h1>
    </div>

    <div class="section_content">
        <div class="section">
            <div class="section_content grid2">
                <div class="section input_section">
                    <div class="section_title input_tag">
                        Name
                    </div>
                    <div class="section_content">
                        <input type="text" placeholder="Name">
                    </div>
                </div>

                <div class="section input_section">
                    <div class="section_title input_tag">
                        Category
                    </div>
                    <div class="section_content">
                        <input type="text" placeholder="Category">
                    </div>
                </div>

                <div class="section input_section">
                    <div class="section_title input_tag">
                        Quantity
                    </div>
                    <div class="section_content">
                        <input type="text" placeholder="Quantity">
                    </div>
                </div>

                <div class="section input_section">
                    <div class="section_title input_tag">
                        Unit
                    </div>
                    <div class="section_content">
                        <input type="text" placeholder="Unit">
                    </div>
                </div>

                <div class="section input_section">
                    <div class="section_title input_tag">
                        Country of Origin
                    </div>
                    <div class="section_content">
                        <input type="text" placeholder="Country of Origin">
                    </div>
                </div>

                <div class="section input_section">
                    <div class="section_title input_tag">
                        Exported To
                    </div>
                    <div class="section_content">
                        <input type="text" placeholder="Exported To">
                    </div>
                </div>

                <div class="section input_section">
                    <div class="section_title input_tag">
                        Unit Price
                    </div>
                    <div class="section_content">
                        <input type="text" placeholder="Unit Price">
                    </div>
                </div>

                <div class="section input_section">
                    <div class="section_title input_tag">
                        Total Value
                    </div>
                    <div class="section_content">
                        <input type="text" placeholder="Total Value">
                    </div>
                </div>

                <div class="section input_section">
                    <div class="section_title input_tag">
                        Description
                    </div>
                    <div class="section_content">
                        <input type="text" placeholder="Description">
                    </div>
                </div>

                <div class="section input_section">
                    <div class="section_title input_tag">
                        Image URL
                    </div>
                    <div class="section_content">
                        <input type="text" placeholder="Image URL">
                    </div>
                </div>
            </div>
        </div>



        <button onclick="document.location.href=`{% url 'stocks_app:exports' %}`">Export</button>

    </div>
</div>




{% endblock %}
